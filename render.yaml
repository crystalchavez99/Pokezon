services:
  - type: web
    name: pokezon
    runtime: docker
    plan: starter
    buildCommand: docker build -t pokezon .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pokezon-db
          property: connectionString
      - key: FLASK_ENV
        value: production
    healthCheckPath: /

databases:
  - name: pokezon-db
    databaseName: pokezon
    user: pokezon_user
    plan: starter
